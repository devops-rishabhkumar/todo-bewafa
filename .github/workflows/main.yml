name: Hello World Workflow

on: workflow_dispatch

jobs:
  my_first_job:
    name: My first job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        continue-on-error: true
      - name: Greeting
        run: echo "Hello World"

  my_second_job:
    name: My second job
    runs-on: windows-latest
    needs: my_first_job
    steps:
      - name: Greeting
        run: write-host "Hello World"
